<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password - HEDIS Score Explainer</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body {
    background-color: #f5f9ff;
    color: #333;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

.container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 20px;
}

/* Header */
header {
    background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
    color: white;
    padding: 25px 0;
}

.header-content {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.logo {
    text-decoration: none;
    color: white;
    font-weight: bold;
    font-size: 1.4rem;
}

.back-link {
    color: white;
    text-decoration: none;
    font-size: 0.9rem;
}

/* Main */
main {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 40px 0;
}

.forgot-container {
    background: white;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    width: 100%;
    max-width: 500px;
    padding: 45px;
    text-align: center;
}

.forgot-container i {
    font-size: 3rem;
    color: #2a5298;
    margin-bottom: 15px;
}

.forgot-container h2 {
    color: #1e3c72;
    margin-bottom: 10px;
}

.forgot-container p {
    color: #666;
    margin-bottom: 25px;
    font-size: 0.95rem;
}

/* Form */
.form-group {
    text-align: left;
    margin-bottom: 20px;
}

label {
    font-weight: 600;
    color: #1e3c72;
    margin-bottom: 6px;
    display: block;
}

input {
    width: 100%;
    padding: 14px;
    border: 2px solid #e1ecff;
    border-radius: 8px;
    font-size: 1rem;
}

input:focus {
    outline: none;
    border-color: #2a5298;
}

/* Button */
.btn {
    width: 100%;
    padding: 14px;
    border-radius: 8px;
    border: none;
    background-color: #2a5298;
    color: white;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    background-color: #1e3c72;
}

.success-message {
    display: none;
    color: green;
    margin-top: 15px;
    font-weight: 600;
}

/* Footer */
footer {
    background-color: #1e3c72;
    color: white;
    text-align: center;
    padding: 20px 0;
    font-size: 0.9rem;
}

/* Responsive */
@media (max-width: 600px) {
    .forgot-container {
        padding: 30px 20px;
    }
}
</style>
</head>

<body>

<header>
<div class="container header-content">
<a href="/index" class="logo">HEDIS Score Explainer</a>
<a href="/login" class="back-link"><i class="fas fa-arrow-left"></i> Back to Login</a>
</div>
</header>

<main>
<div class="forgot-container">
<i class="fas fa-key"></i>
<h2>Forgot Your Password?</h2>
<p>Enter your email address and we’ll send you instructions to reset your password.</p>

<form id="forgotForm">
<div class="form-group">
<label for="email">Email Address</label>
<input type="email" id="email" placeholder="Enter your registered email" required>
</div>

<button type="submit" class="btn">Send Reset Link</button>
</form>

<div class="success-message" id="successMsg">
Reset link sent! Please check your inbox.
</div>

</div>
</main>

<footer>
<p>CareGaps Measure Score Explainer Bot</p>
</footer>

<script>
document.getElementById("forgotForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const email = document.getElementById("email").value;
    if(!email){
        alert("Please enter your email");
        return;
    }

    const formData = new FormData();
    formData.append("email", email);

    try {
        const res = await fetch("/api/forgot-password", {
            method: "POST",
            body: formData
        });

        const data = await res.json();

        document.getElementById("successMsg").style.display = "block";
        document.querySelector(".btn").disabled = true;
        document.querySelector(".btn").textContent = "Sent";

    } catch (error) {
        alert("Server error. Try again.");
    }
});
</script>

</body>
</html>
